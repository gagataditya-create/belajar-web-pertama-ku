<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Penilaian Seni Rupa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
        .loader { border-top-color: #3498db; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-scroll::-webkit-scrollbar { height: 6px; }
        .tab-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-2 md:p-8 font-sans text-gray-800">

    <div class="max-w-5xl mx-auto bg-white p-4 md:p-6 rounded-lg shadow-md border-t-4 border-blue-600 relative">
        
        <!-- TOMBOL SHORTCUT DATABASE -->
        <a href="https://docs.google.com/spreadsheets/d/17UzNxJ_Y46AdgW6svHX-XUANqW2SvT5mL5lJUHXC7pI/edit?gid=861137071#gid=861137071" target="_blank" title="Buka Database Penilaian" class="absolute top-3 right-3 md:top-5 md:right-5 bg-gray-100 hover:bg-gray-200 text-gray-600 hover:text-blue-600 px-2 py-1 md:px-3 md:py-1.5 rounded font-bold text-[10px] md:text-xs shadow-sm border border-gray-300 flex items-center gap-1 transition duration-200 z-10">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
            <span class="hidden md:inline">Database</span>
        </a>

        <h2 id="appTitle" class="text-2xl font-bold text-center mb-2 text-gray-800">Aplikasi Penilaian Lomba</h2>
        <p id="infoRubrik" class="text-xs text-center text-gray-500 mb-6 hidden"></p>
        
        <div id="loading" class="flex justify-center items-center py-10">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
            <span class="ml-3 text-gray-500 font-semibold">Mengambil data...</span>
        </div>

        <div id="mainContent" class="hidden">
            <!-- KONTROL ATAS (Lokasi & Download Excel) -->
            <div class="flex flex-col sm:flex-row justify-end items-end sm:items-center mb-4 gap-2">
                <input type="text" id="inputLokasi" placeholder="Lokasi (Cth: Kebumen)" class="border-2 border-gray-300 p-2 rounded text-sm focus:border-blue-500 outline-none w-full sm:w-64 font-semibold text-gray-700">
                <button onclick="downloadExcel()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded font-bold text-sm shadow transition duration-200 whitespace-nowrap flex items-center gap-2 justify-center w-full sm:w-auto">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Download Excel
                </button>
            </div>

            <!-- AREA TAB -->
            <div class="border-b-2 border-gray-200 mb-4 pb-1">
                <div id="juriTabs" class="flex overflow-x-auto tab-scroll gap-2 pt-2">
                    <!-- Tab Juri dan Tab Rekap akan di-generate oleh JS -->
                </div>
            </div>

            <!-- TABEL KONTEN -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead id="tableHead">
                        <!-- Header tabel dinamis -->
                    </thead>
                    <tbody id="tableBody">
                        <!-- Baris peserta/rekap akan di-generate oleh JS -->
                    </tbody>
                </table>
            </div>

            <!-- TOMBOL SIMPAN SEMUA -->
            <div id="wadahSimpanSemua" class="mt-6 flex justify-end hidden">
                <button id="btnSimpanSemua" onclick="simpanSemua()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded font-bold shadow-lg transition duration-200">
                    Simpan Semua Nilai
                </button>
            </div>
        </div>

        <!-- Notifikasi Mengambang -->
        <div id="toastNotif" class="fixed bottom-5 right-5 bg-blue-600 text-white px-6 py-3 rounded shadow-lg font-bold transition-opacity duration-300 opacity-0 pointer-events-none z-50">
            Aksi berhasil dilakukan!
        </div>
    </div>

    <script>
        // ATURAN 1 AKTIF: Logika inti (fetch) dan URL Sheet tidak diubah.
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyF9--NFKf5HNLdn0fjghsXkK2dTLcvIqImeDgP4qUjib-QdEw7C6XLfNa1Efpfn24b/exec";
        
        let dataGlobal = {};
        let activeJuri = "";
        
        // Memori lokal untuk menyimpan nilai sementara
        let rekapanNilai = {}; 

        // Data sampel dikosongkan agar aplikasi mulai dari 0
        const fallbackData = {
            juri: [],
            peserta: [],
            rubrik: []
        };

        function initUI(data) {
            dataGlobal = data;
            
            // Inisialisasi struktur memori rekapan
            dataGlobal.juri.forEach(j => { rekapanNilai[j] = {}; });

            const infoRubrikText = data.rubrik.map(r => `${r.kriteria} (${r.bobot})`).join(" | ");
            const lblRubrik = document.getElementById('infoRubrik');
            lblRubrik.innerText = "Rubrik: " + infoRubrikText;
            lblRubrik.classList.remove('hidden');

            const tabsContainer = document.getElementById('juriTabs');
            tabsContainer.innerHTML = '';
            
            if(data.juri.length > 0) {
                activeJuri = data.juri[0]; 
                
                // Render Tab Juri
                data.juri.forEach(j => {
                    const btn = document.createElement('button');
                    btn.innerText = j;
                    btn.id = `tab-${j.replace(/\s+/g, '-')}`;
                    btn.className = `whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 ${j === activeJuri ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600 hover:bg-gray-300'}`;
                    btn.onclick = () => { activeJuri = j; updateTabStyles(); renderTable(); };
                    tabsContainer.appendChild(btn);
                });

                // Render Tab STRATEGI KHUSUS
                const btnStrategi = document.createElement('button');
                btnStrategi.innerText = "INPUT STRATEGI";
                btnStrategi.id = "tab-STRATEGI";
                btnStrategi.className = `whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-purple-200 text-purple-800 hover:bg-purple-300 ml-4 border-l-4 border-purple-500`;
                btnStrategi.onclick = () => { activeJuri = "STRATEGI"; updateTabStyles(); renderTable(); };
                tabsContainer.appendChild(btnStrategi);

                // Render Tab REKAPITULASI
                const btnRekap = document.createElement('button');
                btnRekap.innerText = "REKAP KESELURUHAN";
                btnRekap.id = "tab-REKAP";
                btnRekap.className = `whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-yellow-200 text-yellow-800 hover:bg-yellow-300 ml-4 border-l-4 border-yellow-500`;
                btnRekap.onclick = () => { activeJuri = "REKAPITULASI"; updateTabStyles(); renderTable(); };
                tabsContainer.appendChild(btnRekap);
            }

            renderTable();
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
        }

        function updateTabStyles() {
            const tabsContainer = document.getElementById('juriTabs');
            Array.from(tabsContainer.children).forEach(btn => {
                let isThisTabActive = false;
                if (activeJuri === "REKAPITULASI" && btn.id === "tab-REKAP") isThisTabActive = true;
                else if (activeJuri === "STRATEGI" && btn.id === "tab-STRATEGI") isThisTabActive = true;
                else if (btn.innerText === activeJuri) isThisTabActive = true;

                if (isThisTabActive) {
                    if (btn.id === 'tab-REKAP') btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-yellow-500 text-white ml-4";
                    else if (btn.id === 'tab-STRATEGI') btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-purple-600 text-white ml-4";
                    else btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-blue-600 text-white";
                } else {
                    if (btn.id === 'tab-REKAP') btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-yellow-200 text-yellow-800 hover:bg-yellow-300 ml-4 border-l-4 border-yellow-500";
                    else if (btn.id === 'tab-STRATEGI') btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-purple-200 text-purple-800 hover:bg-purple-300 ml-4 border-l-4 border-purple-500";
                    else btn.className = "whitespace-nowrap px-4 py-2 font-bold rounded-t-lg transition-colors duration-200 bg-gray-200 text-gray-600 hover:bg-gray-300";
                }
            });
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');
            const wadahSimpan = document.getElementById('wadahSimpanSemua');
            const btnSimpan = document.getElementById('btnSimpanSemua');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (activeJuri === "REKAPITULASI") {
                wadahSimpan.classList.add('hidden');
                let headRow = `<tr class="bg-yellow-100 text-gray-700 text-sm md:text-base border-b-2 border-yellow-300">
                    <th class="p-2">No</th>
                    <th class="p-2">Nama & Asal Sekolah</th>`;
                dataGlobal.juri.forEach(j => { headRow += `<th class="p-2 text-center text-xs">${j}</th>`; });
                headRow += `<th class="p-2 text-center w-24">Jumlah</th><th class="p-2 text-center w-24">Ranking</th></tr>`;
                thead.innerHTML = headRow;

                // Kalkulasi Ranking
                let rekapData = dataGlobal.peserta.map((p, i) => {
                    let totalSemua = 0;
                    let rincianJuri = {};
                    dataGlobal.juri.forEach(j => {
                        let nilai = (rekapanNilai[j] && rekapanNilai[j][i]) ? rekapanNilai[j][i].total : 0;
                        rincianJuri[j] = nilai;
                        totalSemua += nilai;
                    });
                    return { ...p, indexAwal: i, total: totalSemua, rincianJuri };
                });
                
                rekapData.sort((a, b) => b.total - a.total);

                rekapData.forEach((p, rankIndex) => {
                    let tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-yellow-50";
                    let rowHtml = `
                        <td class="p-2 text-center font-bold text-gray-500">${p.no}</td>
                        <td class="p-2"><div class="font-bold text-gray-800">${p.nama}</div><div class="text-xs text-blue-600">${p.sekolah}</div></td>`;
                    
                    dataGlobal.juri.forEach(j => {
                        let nilai = p.rincianJuri[j];
                        rowHtml += `<td class="p-2 text-center font-semibold ${nilai > 0 ? 'text-green-600' : 'text-gray-300'}">${nilai > 0 ? nilai : '-'}</td>`;
                    });
                    
                    rowHtml += `
                        <td class="p-2 text-center font-bold text-blue-700 text-lg">${p.total}</td>
                        <td class="p-2 text-center font-bold text-red-600 text-lg">#${rankIndex + 1}</td>`;
                    tr.innerHTML = rowHtml;
                    tbody.appendChild(tr);
                });

            } else if (activeJuri === "STRATEGI") {
                wadahSimpan.classList.remove('hidden');
                btnSimpan.innerText = "Simpan Strategi Penilaian";
                btnSimpan.onclick = simpanStrategi;
                btnSimpan.className = "bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded font-bold shadow-lg transition duration-200";

                let headRow = `<tr class="bg-purple-100 text-gray-700 text-sm md:text-base border-b-2 border-purple-300">
                    <th class="p-2 w-20 text-center">Rank</th>
                    <th class="p-2">Pilih Peserta (No. Undi - Nama)</th>`;
                dataGlobal.juri.forEach(j => { headRow += `<th class="p-2 text-center w-24">${j}</th>`; });
                headRow += `</tr>`;
                thead.innerHTML = headRow;

                let optionsHtml = `<option value="">-- Pilih Peserta --</option>`;
                dataGlobal.peserta.forEach((p, idx) => {
                    optionsHtml += `<option value="${idx}">${p.no} - ${p.nama}</option>`;
                });

                for (let i = 0; i < dataGlobal.peserta.length; i++) {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-purple-50 transition-colors";
                    let rowHtml = `
                        <td class="p-2 text-center font-bold text-purple-700 text-lg">Ke-${i + 1}</td>
                        <td class="p-2">
                            <select id="strat_peserta_${i}" class="w-full border-2 border-purple-300 p-2 rounded focus:outline-none focus:border-purple-600 font-semibold text-gray-800">
                                ${optionsHtml}
                            </select>
                        </td>`;
                    
                    dataGlobal.juri.forEach((j, jIndex) => {
                        rowHtml += `<td class="p-2">
                            <input type="number" id="strat_nilai_${jIndex}_${i}" class="w-full border-2 border-green-400 p-2 text-center font-bold rounded focus:outline-none focus:border-green-600" placeholder="0" min="1" max="100">
                        </td>`;
                    });
                    
                    tr.innerHTML = rowHtml;
                    tbody.appendChild(tr);
                }

            } else {
                wadahSimpan.classList.remove('hidden');
                btnSimpan.innerText = "Simpan Semua Nilai";
                btnSimpan.onclick = simpanSemua;
                btnSimpan.className = "bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded font-bold shadow-lg transition duration-200";

                thead.innerHTML = `
                    <tr class="bg-gray-100 text-gray-700 text-sm md:text-base border-b-2">
                        <th class="p-2">No</th>
                        <th class="p-2">Nama & Asal Sekolah</th>
                        <th class="p-2 w-32 text-center">Nilai Akhir</th>
                    </tr>`;

                dataGlobal.peserta.forEach((p, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "border-b hover:bg-blue-50 transition-colors";
                    
                    let memoriNilai = (rekapanNilai[activeJuri] && rekapanNilai[activeJuri][index]) ? rekapanNilai[activeJuri][index].total : '';

                    tr.innerHTML = `
                        <td class="p-2 text-center font-bold text-gray-500">${p.no}</td>
                        <td class="p-2">
                            <div class="font-bold text-gray-800">${p.nama}</div>
                            <div class="text-xs text-blue-600 font-semibold">${p.sekolah}</div>
                        </td>
                        <td class="p-2">
                            <input type="number" id="nilai_${index}" value="${memoriNilai}" class="w-full border-2 border-green-400 p-2 text-center font-bold rounded focus:outline-none focus:border-green-600" placeholder="0" min="1" max="100">
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        fetch(SCRIPT_URL + "?t=" + new Date().getTime(), { redirect: "follow" })
            .then(response => {
                if (!response.ok) throw new Error("Jaringan bermasalah");
                return response.json();
            })
            .then(data => initUI(data))
            .catch(error => {
                console.warn("Peringatan Fetch:", error.message);
                initUI(fallbackData);
                document.getElementById('appTitle').innerHTML += ' <br><span class="text-xs bg-yellow-200 text-yellow-800 px-2 py-1 rounded align-middle">Mode Simulasi Preview</span>';
            });

        // AI Pecah Nilai
        function pecahNilaiNatural(totalNilai, rubrikData) {
            let totalBobot = rubrikData.reduce((sum, r) => sum + r.bobot, 0);
            let sisaNilai = totalNilai;
            let hasil = [];

            rubrikData.forEach(r => {
                let porsi = Math.floor((r.bobot / totalBobot) * totalNilai);
                hasil.push({ kriteria: r.kriteria, nilai: porsi, max: r.bobot });
            });

            let totalSementara = hasil.reduce((sum, h) => sum + h.nilai, 0);
            let selisih = totalNilai - totalSementara;

            while (selisih > 0) {
                let indexAcak = Math.floor(Math.random() * hasil.length);
                if (hasil[indexAcak].nilai < hasil[indexAcak].max) {
                    hasil[indexAcak].nilai++;
                    selisih--;
                }
            }

            let jumlahShift = Math.floor(Math.random() * 3) + 1; 
            for (let i = 0; i < jumlahShift; i++) {
                let idxUp = Math.floor(Math.random() * hasil.length);
                let idxDown = Math.floor(Math.random() * hasil.length);
                
                if (idxUp !== idxDown) {
                    if (hasil[idxUp].nilai < hasil[idxUp].max && hasil[idxDown].nilai > 1) {
                        hasil[idxUp].nilai++;
                        hasil[idxDown].nilai--;
                    }
                }
            }
            
            return hasil;
        }

        function simpanSemua() {
            const btn = document.getElementById('btnSimpanSemua');
            btn.innerText = "Memproses & Menyimpan...";
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-gray-400');
            btn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-400');

            let adaInput = false;

            for (let i = 0; i < dataGlobal.peserta.length; i++) {
                const inputElement = document.getElementById(`nilai_${i}`);
                if (!inputElement) continue;

                const val = inputElement.value;
                if (val && parseInt(val) > 0) {
                    adaInput = true;
                    const totalNilaiInput = parseInt(val);
                    const pesertaTerpilih = dataGlobal.peserta[i];
                    const hasilPecahan = pecahNilaiNatural(totalNilaiInput, dataGlobal.rubrik);
                    
                    rekapanNilai[activeJuri][i] = {
                        total: totalNilaiInput,
                        rincian: hasilPecahan
                    };

                    let teksRincian = hasilPecahan.map(h => `${h.kriteria} (${h.nilai})`).join(", ");

                    const payload = {
                        waktu: new Date().toLocaleString('id-ID'),
                        namaJuri: activeJuri,
                        namaPeserta: pesertaTerpilih.nama,
                        totalNilai: totalNilaiInput,
                        detailPecahan: teksRincian
                    };

                    fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { "Content-Type": "text/plain;charset=utf-8" },
                        body: JSON.stringify(payload)
                    }).catch(error => console.warn(error));
                }
            }

            if (!adaInput) {
                alert("Belum ada nilai yang diinput di tab ini!");
                btn.innerText = "Simpan Semua Nilai";
                btn.disabled = false;
                btn.classList.replace('bg-gray-400', 'bg-blue-600');
                btn.classList.replace('hover:bg-gray-400', 'hover:bg-blue-700');
                return;
            }

            setTimeout(() => {
                tampilkanNotif("Semua nilai " + activeJuri + " berhasil disimpan!", "bg-green-600");
                btn.innerText = "✓ Tersimpan";
                btn.classList.replace('bg-gray-400', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerText = "Simpan Semua Nilai";
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                    btn.classList.replace('hover:bg-gray-400', 'hover:bg-blue-700');
                }, 3000);
            }, 1000);
        }

        function simpanStrategi() {
            const btn = document.getElementById('btnSimpanSemua');
            btn.innerText = "Memproses & Menyimpan...";
            btn.disabled = true;
            btn.classList.replace('bg-purple-600', 'bg-gray-400');
            btn.classList.replace('hover:bg-purple-700', 'hover:bg-gray-400');

            let adaInput = false;

            for (let i = 0; i < dataGlobal.peserta.length; i++) {
                const selectPeserta = document.getElementById(`strat_peserta_${i}`);
                if (!selectPeserta || selectPeserta.value === "") continue;

                const pesertaIdx = parseInt(selectPeserta.value);
                const pesertaTerpilih = dataGlobal.peserta[pesertaIdx];

                dataGlobal.juri.forEach((juriName, jIndex) => {
                    const inputElement = document.getElementById(`strat_nilai_${jIndex}_${i}`);
                    if (!inputElement) return;

                    const val = inputElement.value;
                    if (val && parseInt(val) > 0) {
                        adaInput = true;
                        const totalNilaiInput = parseInt(val);
                        const hasilPecahan = pecahNilaiNatural(totalNilaiInput, dataGlobal.rubrik);
                        
                        rekapanNilai[juriName][pesertaIdx] = {
                            total: totalNilaiInput,
                            rincian: hasilPecahan
                        };

                        let teksRincian = hasilPecahan.map(h => `${h.kriteria} (${h.nilai})`).join(", ");

                        const payload = {
                            waktu: new Date().toLocaleString('id-ID'),
                            namaJuri: juriName,
                            namaPeserta: pesertaTerpilih.nama,
                            totalNilai: totalNilaiInput,
                            detailPecahan: teksRincian
                        };

                        fetch(SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { "Content-Type": "text/plain;charset=utf-8" },
                            body: JSON.stringify(payload)
                        }).catch(error => console.warn(error));
                    }
                });
            }

            if (!adaInput) {
                alert("Belum ada data strategi yang diinput!");
                btn.innerText = "Simpan Strategi Penilaian";
                btn.disabled = false;
                btn.classList.replace('bg-gray-400', 'bg-purple-600');
                btn.classList.replace('hover:bg-gray-400', 'hover:bg-purple-700');
                return;
            }

            setTimeout(() => {
                tampilkanNotif("Strategi Penilaian berhasil disebar ke memori semua Juri!", "bg-purple-600");
                btn.innerText = "✓ Strategi Tersimpan";
                btn.classList.replace('bg-gray-400', 'bg-green-600');
                
                setTimeout(() => {
                    btn.innerText = "Simpan Strategi Penilaian";
                    btn.disabled = false;
                    btn.classList.replace('bg-green-600', 'bg-purple-600');
                    btn.classList.replace('hover:bg-gray-400', 'hover:bg-purple-700');
                }, 3000);
            }, 1500);
        }

        function downloadExcel() {
            if (!dataGlobal.peserta) return;
            
            // PENGAMANAN BARU: Cegah download dari Tab Strategi agar tidak error
            if (activeJuri === "STRATEGI") {
                alert("Mohon buka Tab Juri atau Tab Rekap Keseluruhan untuk mengunduh file Excel.");
                return;
            }

            tampilkanNotif("Menyiapkan file Excel...", "bg-blue-600");

            let lokasi = document.getElementById('inputLokasi').value || ".......................";
            let tglSekarang = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
            let tahunSekarang = new Date().getFullYear();

            let wb = XLSX.utils.book_new();
            let wsData = [];
            
            wsData.push(["LEMBAR PENILAIAN"]);
            wsData.push(["FESTIVAL LOMBA SENI DAN SASTRA SISWA NASIONAL (FLS3N) SD"]);
            wsData.push([`TINGKAT KECAMATAN / KABUPATEN TAHUN ${tahunSekarang}`]);
            wsData.push([activeJuri === "REKAPITULASI" ? "REKAP KESELURUHAN" : "CABANG : GAMBAR BERCERITA - " + activeJuri]);
            wsData.push([]); 
            
            let merges = [];

            if (activeJuri === "REKAPITULASI") {
                let header1 = ["NO", "NAMA PESERTA", "ASAL SEKOLAH", "HASIL PENILAIAN"];
                let header2 = ["", "", ""]; 
                
                for(let i=0; i < dataGlobal.juri.length - 1; i++) { header1.push(""); }
                header1.push("JUMLAH", "RANKING");

                dataGlobal.juri.forEach(j => { header2.push(j); });
                header2.push("", "");

                wsData.push(header1);
                wsData.push(header2);

                merges.push({s:{r:5, c:0}, e:{r:6, c:0}}); 
                merges.push({s:{r:5, c:1}, e:{r:6, c:1}}); 
                merges.push({s:{r:5, c:2}, e:{r:6, c:2}}); 
                merges.push({s:{r:5, c:3}, e:{r:5, c:3 + dataGlobal.juri.length - 1}}); 
                merges.push({s:{r:5, c:3 + dataGlobal.juri.length}, e:{r:6, c:3 + dataGlobal.juri.length}}); 
                merges.push({s:{r:5, c:4 + dataGlobal.juri.length}, e:{r:6, c:4 + dataGlobal.juri.length}}); 

                let rekapData = dataGlobal.peserta.map((p, i) => {
                    let totalSemua = 0;
                    let rincianJuri = {};
                    dataGlobal.juri.forEach(j => {
                        let nilai = (rekapanNilai[j] && rekapanNilai[j][i]) ? rekapanNilai[j][i].total : 0;
                        rincianJuri[j] = nilai;
                        totalSemua += nilai;
                    });
                    return { ...p, total: totalSemua, rincianJuri };
                });
                rekapData.sort((a, b) => b.total - a.total);

                rekapData.forEach((p, rankIndex) => {
                    let row = [p.no, p.nama, p.sekolah];
                    dataGlobal.juri.forEach(j => { row.push(p.rincianJuri[j]); });
                    row.push(p.total, rankIndex + 1);
                    wsData.push(row);
                });

            } else {
                let header1 = ["NO", "NAMA PESERTA", "ASAL SEKOLAH", "KRITERIA PENILAIAN"];
                let header2 = ["", "", ""];
                let header3 = ["", "", ""]; 
                
                for(let i=0; i < dataGlobal.rubrik.length - 1; i++) { header1.push(""); }
                header1.push("JUMLAH NILAI");

                dataGlobal.rubrik.forEach(r => { 
                    header2.push(r.kriteria); 
                    header3.push(`(Max: ${r.bobot})`); 
                });
                header2.push("");
                header3.push("");

                wsData.push(header1);
                wsData.push(header2);
                wsData.push(header3); 

                merges.push({s:{r:5, c:0}, e:{r:7, c:0}}); 
                merges.push({s:{r:5, c:1}, e:{r:7, c:1}}); 
                merges.push({s:{r:5, c:2}, e:{r:7, c:2}}); 
                merges.push({s:{r:5, c:3}, e:{r:5, c:3 + dataGlobal.rubrik.length - 1}}); 
                merges.push({s:{r:5, c:3 + dataGlobal.rubrik.length}, e:{r:7, c:3 + dataGlobal.rubrik.length}}); 

                dataGlobal.peserta.forEach((p, index) => {
                    let memori = rekapanNilai[activeJuri][index];
                    let row = [p.no, p.nama, p.sekolah];
                    
                    if (memori) {
                        dataGlobal.rubrik.forEach((r, idxRubrik) => {
                            let nilaiRubrik = memori.rincian[idxRubrik] ? memori.rincian[idxRubrik].nilai : 0;
                            row.push(nilaiRubrik);
                        });
                        row.push(memori.total);
                    } else {
                        dataGlobal.rubrik.forEach(() => { row.push(0); });
                        row.push(0);
                    }
                    wsData.push(row);
                });

                let kolomTerakhirIdx = 3 + dataGlobal.rubrik.length; 
                
                let rowTgl = Array(kolomTerakhirIdx).fill(""); 
                rowTgl.push(`${lokasi}, ${tglSekarang}`);
                
                let rowJabatan = Array(kolomTerakhirIdx).fill(""); 
                rowJabatan.push("Juri Penilai,");
                
                let rowKosong = Array(kolomTerakhirIdx).fill("");
                
                let rowNamaTTD = Array(kolomTerakhirIdx).fill(""); 
                rowNamaTTD.push(`( ${activeJuri} )`);

                wsData.push([]); 
                wsData.push([]);
                wsData.push(rowTgl);
                wsData.push(rowJabatan);
                wsData.push(rowKosong);
                wsData.push(rowKosong);
                wsData.push(rowKosong);
                wsData.push(rowNamaTTD);
            }

            let ws = XLSX.utils.aoa_to_sheet(wsData);
            ws['!merges'] = merges;
            ws['!cols'] = [{wch: 5}, {wch: 30}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}];

            let safeSheetName = ("Data " + activeJuri).replace(/[*?\]\[\/\\:\|]/g, "").substring(0, 31);
            let safeFileName = `NILAI_GB_${activeJuri.replace(/[^a-zA-Z0-9]/g, '_')}.xlsx`;

            XLSX.utils.book_append_sheet(wb, ws, safeSheetName);
            XLSX.writeFile(wb, safeFileName);
        }

        function tampilkanNotif(pesan, warnaClass = "bg-green-600") {
            const toast = document.getElementById('toastNotif');
            toast.innerText = pesan;
            toast.className = `fixed bottom-5 right-5 text-white px-6 py-3 rounded shadow-lg font-bold transition-opacity duration-300 pointer-events-none z-50 ${warnaClass}`;
            toast.classList.remove('opacity-0');
            setTimeout(() => { toast.classList.add('opacity-0'); }, 3000);
        }
    </script>
</body>
</html>
